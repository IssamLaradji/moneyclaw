<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}MoneyClaw{% endblock %}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: #e8e0d0; display: flex; justify-content: center; }
    body { width: 70vw; box-shadow: 0 0 40px rgba(0,0,0,0.10); font-family: 'Segoe UI', sans-serif; background: #fffbf0; color: #1a1a2e; {% block body_extra_style %}{% endblock %} }

    nav { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex-shrink: 0; }
    .logo { font-size: 1.5rem; font-weight: 800; color: #f5a623; text-decoration: none; }
    .logo span { color: #1a1a2e; }
    nav a { text-decoration: none; color: #1a1a2e; font-weight: 500; margin-left: 2rem; }
    nav a:hover, nav a.active { color: #f5a623; }

    label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; color: #aaa; display: block; margin-bottom: 0.3rem; }
    input, select, textarea { width: 100%; padding: 0.55rem 0.8rem; border: 1.5px solid #ffe9a0; border-radius: 8px; font-size: 0.88rem; background: #fffbf0; color: #1a1a2e; outline: none; font-family: inherit; }
    input:focus, select:focus, textarea:focus { border-color: #f5a623; }
    textarea { resize: vertical; }
    select { cursor: pointer; }

    .btn { display: inline-block; border: none; border-radius: 8px; padding: 0.75rem 1.2rem; font-size: 0.92rem; font-weight: 700; cursor: pointer; width: 100%; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-orange { background: #f5a623; color: #fff; }
    .btn-blue   { background: #2563eb; color: #fff; }
    .btn-red    { background: #dc2626; color: #fff; }

    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar { width: 280px; background: #fff; border-right: 1.5px solid #ffe9a0; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; flex-shrink: 0; overflow-y: auto; }
    .sidebar h1 { font-size: 1.2rem; font-weight: 900; line-height: 1.3; }
    .sidebar-desc { font-size: 0.85rem; color: #666; line-height: 1.5; }

    .page-header { padding: 2.5rem 2.5rem 1rem; background: linear-gradient(135deg, #fff9e6 0%, #fff0c2 100%); }
    .page-header h1 { font-size: 2rem; font-weight: 900; }
    .page-header p { color: #666; margin-top: 0.4rem; font-size: 1rem; }

    .ready-state { margin: auto; text-align: center; color: #bbb; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
    .ready-state .icon { font-size: 2.5rem; }
    .ready-state strong { color: #1a1a2e; font-size: 1.05rem; }
    .ready-state p { font-size: 0.88rem; }

    .error { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 0.8rem 1rem; font-size: 0.87rem; }

    .tag-todo { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 20px; background: #fef3cd; color: #856404; border: 1px solid #fde68a; white-space: nowrap; }
    .tag-llm  { display: inline-block; font-size: 0.7rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 20px; background: #fce7f3; color: #9d174d; border: 1px solid #f9a8d4; white-space: nowrap; }

    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
    .status-dot.listening { background: #059669; animation: pulse 1.2s infinite; }
    .status-dot.listening-blue { background: #2563eb; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.35} }
    .status-text { font-size: 0.82rem; color: #555; display: flex; align-items: center; gap: 0.4rem; }

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
<nav>
  <a href="/" class="logo">Money<span>Claw</span></a>
  <div>
    <a href="/components" {% if active == 'components' %}class="active"{% endif %}>Components</a>
    <a href="/workflows" {% if active == 'workflows' %}class="active"{% endif %}>Workflows</a>
    <a href="/agent" {% if active == 'agent' %}class="active"{% endif %}>AI Agent</a>
    <a href="/flowchart" {% if active == 'flowchart' %}class="active"{% endif %}>Flowchart</a>
  </div>
</nav>
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
